<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16A34A"></stop>
      <stop offset="100%" stop-color="#0284C7"></stop>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.18"></feDropShadow>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="#F8FAFC"></rect>
  <g filter="url(#shadow)">
    <rect x="150" y="170" width="724" height="520" rx="120" fill="#FFFFFF" stroke="url(#accent)" stroke-width="10"></rect>
    <text x="512" y="620" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="86" font-weight="800" fill="#0F172A" letter-spacing="2">
      SM ARENA
    </text>
    <text x="512" y="680" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="600" fill="#334155">
      games • рейтинги • спільнота
    </text>

    <!-- Simple mark -->
    <g transform="translate(292,250)">
      <rect x="0" y="0" width="440" height="260" rx="60" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="6"></rect>
      <circle cx="110" cy="130" r="58" fill="none" stroke="url(#accent)" stroke-width="18"></circle>
      <g stroke="#EF4444" stroke-width="18" stroke-linecap="round">
        <line x1="270" y1="84" x2="356" y2="170"></line>
        <line x1="356" y1="84" x2="270" y2="170"></line>
      </g>
      <circle cx="360" cy="180" r="34" fill="none" stroke="#0F172A" stroke-width="16" opacity="0.75"></circle>
    </g>
  </g>
</svg>
