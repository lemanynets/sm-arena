<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"></stop>
      <stop offset="100%" stop-color="#101B33"></stop>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22C55E"></stop>
      <stop offset="100%" stop-color="#38BDF8"></stop>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"></rect>

  <!-- Mark -->
  <g filter="url(#softShadow)">
    <!-- Badge -->
    <rect x="162" y="170" width="700" height="520" rx="120" fill="#0E1730" stroke="url(#accent)" stroke-width="10"></rect>

    <!-- Checkerboard (left) -->
    <g transform="translate(240,250)">
      <rect x="0" y="0" width="260" height="260" rx="40" fill="#0B1220" stroke="#1F2A4A" stroke-width="6"></rect>
      <!-- squares -->
      <g opacity="0.95">
        <!-- 4x4 simplified -->
        <rect x="24" y="24" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="128" y="24" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="76" y="76" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="180" y="76" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="24" y="128" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="128" y="128" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="76" y="180" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
        <rect x="180" y="180" width="52" height="52" fill="#F8FAFC" opacity="0.9"></rect>
      </g>

      <!-- checkers pieces -->
      <circle cx="86" cy="86" r="28" fill="url(#accent)"></circle>
      <circle cx="174" cy="174" r="28" fill="#EF4444"></circle>
    </g>

    <!-- Tic-tac-toe (right) -->
    <g transform="translate(556,250)">
      <rect x="0" y="0" width="260" height="260" rx="40" fill="#0B1220" stroke="#1F2A4A" stroke-width="6"></rect>
      <g stroke="#CBD5E1" stroke-width="10" stroke-linecap="round" opacity="0.9">
        <line x1="86" y1="34" x2="86" y2="226"></line>
        <line x1="174" y1="34" x2="174" y2="226"></line>
        <line x1="34" y1="86" x2="226" y2="86"></line>
        <line x1="34" y1="174" x2="226" y2="174"></line>
      </g>

      <!-- X -->
      <g stroke="url(#accent)" stroke-width="14" stroke-linecap="round">
        <line x1="52" y1="52" x2="120" y2="120"></line>
        <line x1="120" y1="52" x2="52" y2="120"></line>
      </g>

      <!-- O -->
      <circle cx="200" cy="200" r="34" fill="none" stroke="#EF4444" stroke-width="14"></circle>
    </g>

    <!-- Title -->
    <text x="512" y="640" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="86" font-weight="800" fill="#F8FAFC" letter-spacing="2">
      SM ARENA
    </text>
    <text x="512" y="700" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="600" fill="#94A3B8">
      games • рейтинги • спільнота
    </text>
  </g>
</svg>
