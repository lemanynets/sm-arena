<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" rx="220" fill="#0B1220"></rect>
  <rect x="170" y="190" width="684" height="470" rx="120" fill="none" stroke="#F8FAFC" stroke-width="12" opacity="0.9"></rect>

  <g fill="none" stroke="#F8FAFC" stroke-width="18" stroke-linecap="round" opacity="0.92">
    <!-- TicTacToe grid -->
    <line x1="590" y1="275" x2="590" y2="520"></line>
    <line x1="690" y1="275" x2="690" y2="520"></line>
    <line x1="515" y1="350" x2="765" y2="350"></line>
    <line x1="515" y1="445" x2="765" y2="445"></line>

    <!-- X -->
    <line x1="535" y1="290" x2="605" y2="360"></line>
    <line x1="605" y1="290" x2="535" y2="360"></line>

    <!-- O -->
    <circle cx="720" cy="470" r="40"></circle>
  </g>

  <!-- Checkers mark -->
  <g fill="#F8FAFC" opacity="0.92">
    <circle cx="330" cy="360" r="44"></circle>
    <circle cx="410" cy="440" r="44"></circle>
  </g>

  <text x="512" y="710" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="84" font-weight="800" fill="#F8FAFC" letter-spacing="2">
    SM ARENA
  </text>
</svg>
